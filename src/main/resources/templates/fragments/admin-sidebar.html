<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- ═══════════════════════════════════════
     ADMIN SIDEBAR FRAGMENT
     Sử dụng: th:replace="~{fragments/admin-sidebar :: sidebar(activeMenu='dashboard')}"
     activeMenu values: dashboard, staff, bookings, rooms, services, settings
═══════════════════════════════════════ -->
<aside class="sidebar" th:fragment="sidebar(activeMenu)">

    <!-- User Profile -->
    <div class="sidebar-profile">
        <div class="profile-avatar">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="20" fill="#c17c5a"/>
                <circle cx="20" cy="16" r="6" fill="#f5ddd0"/>
                <path d="M8 34C8 27.4 13.4 22 20 22s12 5.4 12 12" fill="#f5ddd0"/>
            </svg>
        </div>
        <div class="profile-info">
            <span class="profile-name" id="sidebarProfileName">Quản trị viên</span>
            <span class="profile-role" id="sidebarProfileRole">Quản trị viên</span>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
        <a href="/admin/dashboard" class="nav-item" th:classappend="${activeMenu == 'dashboard'} ? ' active'" id="navDashboard">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/>
                <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/>
                <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/>
                <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/>
            </svg>
            <span>Tổng quan</span>
        </a>

        <a href="/admin/staff" class="nav-item" th:classappend="${activeMenu == 'staff'} ? ' active'" id="navStaff">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/>
                <path d="M3 20C3 16.7 5.7 14 9 14s6 2.7 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M16 11C17.1 11 18 10.1 18 9s-.9-2-2-2M22 20c0-3.3-2.7-6-6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <span>Nhân viên</span>
        </a>

        <a href="/admin/bookings" class="nav-item" th:classappend="${activeMenu == 'bookings'} ? ' active'" id="navBookings">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/>
                <path d="M8 2V6M16 2V6M3 10H21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M8 14H16M8 18H12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <span>Lịch trình</span>
        </a>

        <a href="/admin/rooms" class="nav-item" th:classappend="${activeMenu == 'rooms'} ? ' active'" id="navRooms">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                <rect x="2" y="7" width="20" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/>
                <path d="M2 13H22M7 13V10C7 8.9 7.9 8 9 8H15C16.1 8 17 8.9 17 10V13" stroke="currentColor" stroke-width="1.8"/>
            </svg>
            <span>Báo cáo</span>
        </a>

        <a href="/admin/admin-services" class="nav-item" th:classappend="${activeMenu == 'services'} ? ' active'" id="navServices">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26C17.81 13.47 19 11.38 19 9c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                <path d="M9 21h6M10 17v4M14 17v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <span>Dịch vụ bổ sung</span>
        </a>

        <a href="/admin/customers" class="nav-item" th:classappend="${activeMenu == 'customers'} ? ' active'" id="navCustomers">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/>
                <path d="M4 20C4 16.13 7.58 13 12 13s8 3.13 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <span>Khách hàng</span>
        </a>

        <a href="/admin/admin-reviews" class="nav-item" th:classappend="${activeMenu == 'reviews'} ? ' active'" id="navReviews">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            </svg>
            <span>Đánh giá</span>
        </a>

        <a href="/admin/cancellation" class="nav-item" th:classappend="${activeMenu == 'cancellation'} ? ' active'" id="navCancellation">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
                <path d="M15 9L9 15M9 9l6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <span>Huỷ đặt phòng</span>
        </a>

        <a href="/admin/special-requests" class="nav-item" th:classappend="${activeMenu == 'special-requests'} ? ' active'" id="navSpecialRequests">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <rect x="9" y="3" width="6" height="4" rx="1" stroke="currentColor" stroke-width="1.8"/>
                <path d="M9 12h6M9 16h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <span>Yêu cầu đặc biệt</span>
        </a>
    </nav>

    <!-- Bottom actions -->
    <div class="sidebar-bottom">
        <a href="/" class="sidebar-action-btn sidebar-home-btn">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                <path d="M3 12L12 3L21 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M9 21V12H15V21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M3 12V21H21V12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Trang chủ</span>
        </a>
        <button class="sidebar-action-btn sidebar-logout-btn" id="btnAdminLogout">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Đăng xuất</span>
        </button>
    </div>

</aside>

<script th:fragment="sidebar-script">
    /* Admin sidebar – điền thông tin user từ localStorage */
    (function () {
        const roleLabels = { ADMIN: 'Quản trị viên', HOTEL_OWNER: 'Chủ khách sạn', GUEST: 'Khách hàng' };
        try {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            if (user) {
                const nameEl = document.getElementById('sidebarProfileName');
                const roleEl = document.getElementById('sidebarProfileRole');
                if (nameEl) nameEl.textContent = user.fullName || 'Quản trị viên';
                if (roleEl) roleEl.textContent = roleLabels[user.role] || user.role || 'Quản trị viên';
            }
        } catch (_) {}
    })();

    /* Admin sidebar logout */
    const btnAdminLogout = document.getElementById('btnAdminLogout');
    if (btnAdminLogout) {
        btnAdminLogout.addEventListener('click', () => {
            localStorage.removeItem('accessToken');
            localStorage.removeItem('user');
            window.location.href = '/login';
        });
    }
</script>

</body>
</html>
