<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo Doanh thu - HotelHub Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/admin-report.css}">
</head>
<body>
<div class="admin-layout">
    <!-- Sidebar -->
    <aside th:replace="~{fragments/admin-sidebar :: sidebar('reports')}"></aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <div class="topbar">
            <h1 class="page-title">Báo cáo Doanh thu & Công nợ</h1>
            <div class="topbar-right">
                <button class="btn-icon" onclick="exportExcel()" title="Xuất Excel">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                </button>
                <button class="btn-icon" onclick="exportPDF()" title="Xuất PDF">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                    </svg>
                </button>
                <button class="btn-icon" onclick="printReport()" title="In báo cáo">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 6 2 18 2 18 9"></polyline>
                        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                        <rect x="6" y="14" width="12" height="8"></rect>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-section">
            <div class="filter-group">
                <label>Từ ngày</label>
                <input type="date" id="startDate" class="filter-input">
            </div>
            <div class="filter-group">
                <label>Đến ngày</label>
                <input type="date" id="endDate" class="filter-input">
            </div>
            <div class="filter-group">
                <label>Nguồn</label>
                <select id="source" class="filter-select">
                    <option value="">Tất cả nguồn</option>
                    <option value="OTA">OTA</option>
                    <option value="Trực tiếp">Trực tiếp</option>
                    <option value="Nhóm">Nhóm</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Trạng thái</label>
                <select id="paymentStatus" class="filter-select">
                    <option value="">Tất cả trạng thái</option>
                    <option value="Đã thanh toán">Đã thanh toán</option>
                    <option value="Chờ thanh toán">Chờ thanh toán</option>
                    <option value="Thất bại">Thất bại</option>
                </select>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Tổng doanh thu</div>
                <div class="stat-val" id="totalRevenue">0 ₫</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Doanh thu thực tế</div>
                <div class="stat-val stat-green" id="actualRevenue">0 ₫</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Tổng công nợ</div>
                <div class="stat-val stat-orange" id="totalExpenses">0 ₫</div>
            </div>
        </div>

        <!-- Report Table -->
        <div class="table-card">
            <table class="room-table">
                <thead>
                <tr>
                    <th>Mã hóa đơn</th>
                    <th>Ngày tạo</th>
                    <th>Khách hàng</th>
                    <th>Phòng</th>
                    <th>Nguồn</th>
                    <th>Tổng tiền</th>
                    <th>Giảm giá</th>
                    <th>Còn lại</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody id="reportTableBody">
                <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination">
            <!-- Pagination buttons will be loaded here -->
        </div>
    </main>
</div>

<script th:inline="javascript">
    const backendUrl = /*[[${backendUrl}]]*/ 'http://localhost:8081';
</script>
<script th:src="@{/js/admin-report.js}"></script>
<div th:replace="~{fragments/admin-sidebar :: sidebar-script}"></div>
</body>
</html>
