<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập – HotelHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/login.css}" />
</head>
<body>

<div class="login-wrapper">

    <!-- ===== LEFT PANEL ===== -->
    <div class="left-panel">
        <img
            class="hotel-bg"
            src="https://www.figma.com/api/mcp/asset/92c93b05-6aa3-443b-9927-9f99f0dffdde"
            alt="Hotel room"
        />
        <div class="overlay"></div>
    </div>

    <!-- ===== RIGHT PANEL ===== -->
    <div class="right-panel">

        <!-- Title block -->
        <div class="title-block">
            <h1>Chào mừng trở lại!</h1>
            <p class="subtitle">Nhập thông tin của bạn để truy cập vào tài khoản.</p>
        </div>

        <!-- Alert banner (success từ register / error từ server) -->
        <div class="alert-banner" id="alertBanner"></div>

        <!-- Email -->
        <label class="field-label" for="email">Email</label>
        <input
            class="input-field"
            type="email"
            id="email"
            name="email"
            placeholder="example@email.com"
            autocomplete="email"
        />
        <span class="error-msg" id="emailError">Vui lòng nhập địa chỉ email hợp lệ.</span>

        <!-- Password + Forgot -->
        <div class="label-row">
            <label for="password">Mật khẩu</label>
            <a href="#" class="forgot-link">Quên mật khẩu?</a>
        </div>
        <input
            class="input-field"
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
        />
        <span class="error-msg" id="passwordError">Vui lòng nhập mật khẩu.</span>

        <!-- Submit button -->
        <button class="btn-login" type="button" id="btnLogin">
            Đăng nhập
        </button>

        <!-- Divider -->
        <div class="divider">
            <hr />
            <span>Hoặc tiếp tục với</span>
            <hr />
        </div>

        <!-- Social buttons -->
        <div class="social-buttons">
            <button class="btn-social" type="button" id="btnGoogle">
                <!-- Google icon -->
                <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.85L38.35 6.2C34.49 2.36 29.52 0 24 0 14.62 0 6.63 5.55 2.68 13.65l7.16 5.56C11.71 13.25 17.38 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.52 24.5c0-1.61-.15-3.16-.41-4.65H24v8.8h12.7c-.55 2.95-2.2 5.44-4.67 7.12l7.15 5.55C43.2 37.39 46.52 31.42 46.52 24.5z"/>
                    <path fill="#FBBC05" d="M9.84 28.79A14.5 14.5 0 0 1 9.5 24c0-1.67.29-3.28.8-4.79L3.14 13.65A23.95 23.95 0 0 0 0 24c0 3.86.92 7.51 2.55 10.75l7.29-5.96z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.92-2.14 15.9-5.82l-7.15-5.55c-2.16 1.45-4.93 2.37-8.75 2.37-6.62 0-12.29-3.75-15.16-9.21l-7.29 5.96C6.63 42.45 14.62 48 24 48z"/>
                    <path fill="none" d="M0 0h48v48H0z"/>
                </svg>
                Google
            </button>

            <button class="btn-social" type="button" id="btnFacebook">
                <!-- Facebook icon -->
                <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#1877F2" d="M48 24C48 10.745 37.255 0 24 0S0 10.745 0 24c0 11.978 8.773 21.91 20.25 23.708V30.938h-6.094V24H20.25v-5.25c0-6.014 3.582-9.337 9.063-9.337 2.625 0 5.375.469 5.375.469v5.906h-3.028c-2.981 0-3.91 1.85-3.91 3.75V24h6.656l-1.064 6.938H27.75v16.77C39.227 45.91 48 35.978 48 24z"/>
                    <path fill="#fff" d="M33.342 30.938 34.406 24H27.75v-4.463c0-1.9.929-3.75 3.91-3.75h3.028V9.881S32.438 9.412 29.813 9.412c-5.481 0-9.063 3.323-9.063 9.338V24h-6.094v6.938H20.25v16.77a24.15 24.15 0 0 0 7.5 0V30.938h5.592z"/>
                </svg>
                Facebook
            </button>
        </div>

        <!-- Register link -->
        <div class="register-link">
            <span>Bạn chưa có tài khoản?</span>
            <a th:href="@{/register}" href="/register">Đăng ký</a>
        </div>

    </div><!-- end .right-panel -->
</div><!-- end .login-wrapper -->

<script th:inline="javascript">
    const BACKEND_URL = /*[[${backendUrl}]]*/ 'http://localhost:8081';

    const btnLogin      = document.getElementById('btnLogin');
    const emailInput    = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailError    = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const alertBanner   = document.getElementById('alertBanner');

    /* ── helpers ── */
    function showError(el, msg) { el.textContent = msg; el.classList.add('visible'); }
    function hideError(el)      { el.classList.remove('visible'); }
    function validateEmail(v)   { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

    function showAlert(type, msg) {
        alertBanner.textContent   = msg;
        alertBanner.className     = 'alert-banner ' + type;
        alertBanner.style.display = 'block';
    }
    function hideAlert() { alertBanner.style.display = 'none'; }

    function setLoading(on) {
        btnLogin.disabled    = on;
        btnLogin.textContent = on ? 'Đang xử lý...' : 'Đăng nhập';
    }

    /* ── hiện thông báo nếu vừa đăng ký xong ── */
    if (new URLSearchParams(window.location.search).get('registered') === 'true') {
        showAlert('success', 'Đăng ký thành công! Vui lòng đăng nhập để tiếp tục.');
    }

    /* ── submit ── */
    btnLogin.addEventListener('click', async () => {
        let valid = true;

        if (!validateEmail(emailInput.value.trim())) {
            showError(emailError, 'Vui lòng nhập địa chỉ email hợp lệ.'); valid = false;
        } else { hideError(emailError); }

        if (passwordInput.value.trim() === '') {
            showError(passwordError, 'Vui lòng nhập mật khẩu.'); valid = false;
        } else { hideError(passwordError); }

        if (!valid) return;

        setLoading(true);
        hideAlert();

        try {
            const res = await fetch(`${BACKEND_URL}/api/auth/login`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email:    emailInput.value.trim(),
                    password: passwordInput.value
                })
            });

            const data = await res.json();

            if (res.status === 200) {
                localStorage.setItem('accessToken', data.accessToken);
                localStorage.setItem('user', JSON.stringify(data.user));
                showAlert('success', 'Đăng nhập thành công! Đang chuyển hướng...');
                setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
                return;
            }

            if (res.status === 401) {
                showAlert('error', 'Email hoặc mật khẩu không đúng.');
            } else if (res.status === 400) {
                const fe = data.fieldErrors;
                if (fe) {
                    if (fe.email)    showError(emailError,    fe.email);
                    if (fe.password) showError(passwordError, fe.password);
                } else {
                    showAlert('error', data.message || 'Dữ liệu không hợp lệ.');
                }
            } else {
                showAlert('error', 'Đã xảy ra lỗi máy chủ. Vui lòng thử lại.');
            }

        } catch (e) {
            showAlert('error', 'Không thể kết nối tới máy chủ. Vui lòng kiểm tra backend đang chạy.');
        } finally {
            setLoading(false);
        }
    });

    /* ── real-time clear errors ── */
    emailInput.addEventListener('input',    () => hideError(emailError));
    passwordInput.addEventListener('input', () => hideError(passwordError));

    document.getElementById('btnGoogle').addEventListener('click', () => {
        alert('Đăng nhập với Google (chưa tích hợp)');
    });
    document.getElementById('btnFacebook').addEventListener('click', () => {
        alert('Đăng nhập với Facebook (chưa tích hợp)');
    });
</script>

</body>
</html>
